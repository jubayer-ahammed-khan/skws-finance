<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সত্যের কাফেলা ওয়েলফেয়ার সোসাইটি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #0f172a; 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
        } 
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .glass-header {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
        }
        select option { background-color: #1e293b; color: #fff; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="max-w-4xl mx-auto p-4 mt-4 md:mt-6">
        
        <div class="flex justify-end mb-4">
            <a href="admin.html" class="inline-flex items-center gap-2 text-sm md:text-base font-bold text-blue-300 bg-blue-900/30 hover:bg-blue-800/60 border border-blue-500/30 transition duration-300 px-5 py-2 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.15)] hover:shadow-[0_0_20px_rgba(59,130,246,0.4)] backdrop-blur-md group">
                <span class="group-hover:scale-110 transition-transform">🔒</span> অ্যাডমিন প্যানেল
            </a>
        </div>

        <div class="glass-header rounded-3xl shadow-2xl p-8 mb-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-blue-500/5 blur-[100px] -z-10"></div>
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-3 tracking-wide drop-shadow-md">সত্যের কাফেলা ওয়েলফেয়ার সোসাইটি</h1>
            <span class="text-sm md:text-base text-blue-300 font-semibold bg-blue-900/40 border border-blue-500/30 inline-block px-5 py-1.5 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.2)]">মাসিক চাঁদা ড্যাশবোর্ড</span>
        </div>

        <div class="glass rounded-2xl shadow-lg p-6 mb-8 flex flex-wrap gap-4 justify-center items-end">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">মাস নির্বাচন করুন</label>
                <select id="monthFilter" class="bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-2.5 w-40 text-white focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition cursor-pointer">
                    <option value="January">জানুয়ারি</option><option value="February">ফেব্রুয়ারি</option>
                    <option value="March">মার্চ</option><option value="April">এপ্রিল</option>
                    <option value="May">মে</option><option value="June">জুন</option>
                    <option value="July">জুলাই</option><option value="August">আগস্ট</option>
                    <option value="September">সেপ্টেম্বর</option><option value="October">অক্টোবর</option>
                    <option value="November">নভেম্বর</option><option value="December">ডিসেম্বর</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Year</label>
                <select id="yearFilter" class="bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-2.5 w-32 text-white focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition cursor-pointer">
                </select>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2.5 rounded-xl font-bold shadow-[0_0_15px_rgba(37,99,235,0.4)] transform transition duration-300 hover:-translate-y-1">
                সার্চ করুন
            </button>
        </div>

        <div id="summaryCards" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 hidden">
            <div class="glass rounded-2xl p-5 border-l-4 border-blue-500 flex items-center justify-between hover:bg-white/5 transition">
                <div>
                    <p class="text-slate-400 text-sm font-semibold mb-1">মোট সংগ্রহ (এই মাস)</p>
                    <h3 id="totalAmountDisplay" class="text-2xl md:text-3xl font-bold text-blue-400">৳ ০</h3>
                </div>
                <div class="text-4xl opacity-80">💰</div>
            </div>
            <div class="glass rounded-2xl p-5 border-l-4 border-emerald-500 flex items-center justify-between hover:bg-white/5 transition">
                <div>
                    <p class="text-slate-400 text-sm font-semibold mb-1">পরিশোধ করেছেন</p>
                    <h3 id="paidCountDisplay" class="text-2xl md:text-3xl font-bold text-emerald-400">০ জন</h3>
                </div>
                <div class="text-4xl opacity-80">✅</div>
            </div>
            <div class="glass rounded-2xl p-5 border-l-4 border-rose-500 flex items-center justify-between hover:bg-white/5 transition">
                <div>
                    <p class="text-slate-400 text-sm font-semibold mb-1">বকেয়া আছে</p>
                    <h3 id="unpaidCountDisplay" class="text-2xl md:text-3xl font-bold text-rose-400">০ জন</h3>
                </div>
                <div class="text-4xl opacity-80">⏳</div>
            </div>
        </div>

        <div id="dataContainer" class="space-y-3">
            <div class="glass rounded-2xl p-8 text-center text-slate-400 font-medium">
                উপর থেকে মাস ও বছর সিলেক্ট করে 'সার্চ করুন' বাটনে ক্লিক করুন
            </div>
        </div>
    </div>

    <script>
        // ⚠️ আপনার API URL এখানে বসাতে ভুলবেন না
        const API_URL = "https://script.google.com/macros/s/AKfycbwRgePnO2r60DaI9qwB1QDrBAS8yAwwihlF-4ibuo-cWvUBZqcAXQ7UUa6oCNhliuyB/exec";

        window.onload = () => {
            const currentYear = new Date().getFullYear();
            const yearSelect = document.getElementById('yearFilter');
            const currentMonth = new Date().toLocaleString('en-US', { month: 'long' });
            
            document.getElementById('monthFilter').value = currentMonth;

            for (let y = 2024; y <= currentYear + 10; y++) {
                let option = document.createElement('option');
                option.value = y;
                option.text = y;
                if (y === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        };

        async function fetchData() {
            const month = document.getElementById('monthFilter').value;
            const year = document.getElementById('yearFilter').value;
            const container = document.getElementById('dataContainer');
            const summaryCards = document.getElementById('summaryCards');
            
            summaryCards.classList.add('hidden');
            
            container.innerHTML = `
                <div class="glass rounded-2xl p-8 text-center text-blue-400 font-bold animate-pulse flex flex-col items-center justify-center gap-3">
                    <svg class="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    ডেটা লোড হচ্ছে...
                </div>`;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const members = data.members; 
                const allPayments = data.payments;
                const filteredPayments = allPayments.filter(row => row.Month === month && String(row.Year) === year);
                
                container.innerHTML = '';
                
                if(members.length === 0) {
                    container.innerHTML = '<div class="glass rounded-2xl p-8 text-center text-red-400 font-bold border-red-500/20">⚠️ গুগল শিটে কোনো মেম্বার অ্যাড করা হয়নি!</div>';
                    return;
                }

                let totalAmount = 0;
                let paidCount = 0;
                let unpaidCount = 0;

                members.forEach(member => {
                    const paymentRecord = filteredPayments.find(p => 
                        String(p.Name).trim() === String(member.Name).trim() && 
                        String(p.Designation).trim() === String(member.Designation).trim()
                    );
                    
                    const isPaid = paymentRecord && paymentRecord.Status.toLowerCase() === 'paid';
                    
                    if(isPaid) {
                        paidCount++;
                        totalAmount += Number(paymentRecord.Amount) || 0; 
                    } else {
                        unpaidCount++;
                    }
                    
                    const statusBadge = isPaid
                        ? '<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-4 py-1.5 rounded-full text-sm font-bold shadow-[0_0_15px_rgba(16,185,129,0.15)] flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>Paid</span>'
                        : '<span class="bg-rose-500/10 text-rose-400 border border-rose-500/30 px-4 py-1.5 rounded-full text-sm font-bold shadow-[0_0_15px_rgba(225,29,72,0.15)] flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-rose-500"></span>Unpaid</span>';

                    container.innerHTML += `
                        <div class="glass rounded-2xl p-4 md:p-5 flex justify-between items-center hover:bg-white/5 transition duration-300 group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-xl md:text-2xl shadow-inner group-hover:border-blue-500/50 transition">
                                    👤
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <h3 class="font-bold text-lg md:text-xl text-slate-100">${member.Name}</h3>
                                    <div>
                                        <span class="text-xs md:text-sm font-bold text-blue-100 bg-blue-600/40 px-3 py-1.5 rounded-lg border border-blue-400/40 backdrop-blur-sm tracking-wide inline-block">${member.Designation}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex-shrink-0 ml-4">
                                ${statusBadge}
                            </div>
                        </div>
                    `;
                });

                document.getElementById('totalAmountDisplay').innerText = `৳ ${totalAmount.toLocaleString('en-IN')}`;
                document.getElementById('paidCountDisplay').innerText = `${paidCount} জন`;
                document.getElementById('unpaidCountDisplay').innerText = `${unpaidCount} জন`;
                summaryCards.classList.remove('hidden');

            } catch (error) {
                container.innerHTML = '<div class="glass rounded-2xl p-8 text-center text-rose-400 font-bold">❌ ইন্টারনেট কানেকশন চেক করুন! ডেটা লোড হয়নি।</div>';
            }
        }
    </script>
</body>
</html>
