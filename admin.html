<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | সত্যের কাফেলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #0f172a; color: #f8fafc; } 
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        select option { background-color: #1e293b; color: #fff; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loginSection" class="glass p-8 rounded-3xl w-full max-w-md border-t-4 border-blue-500">
        <h2 class="text-3xl font-bold text-white text-center mb-6">অ্যাডমিন লগিন</h2>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="admin" class="input-glass w-full p-3 rounded-xl">
            <input type="password" id="password" placeholder="••••••••" class="input-glass w-full p-3 rounded-xl">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">লগিন করুন</button>
            <p id="loginError" class="text-rose-400 text-center hidden mt-2">❌ ভুল পাসওয়ার্ড!</p>
        </div>
        <div class="text-center mt-6"><a href="index.html" class="text-slate-400 hover:text-white">← ফিরে যান</a></div>
    </div>

    <div id="formSection" class="w-full max-w-2xl hidden space-y-6">
        <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl border border-slate-700">
            <h2 class="text-xl font-bold text-white">ড্যাশবোর্ড কন্ট্রোল</h2>
            <button onclick="logout()" class="text-sm bg-rose-500/10 text-rose-400 px-4 py-2 rounded-lg font-bold border border-rose-500/30">লগ আউট</button>
        </div>

        <div class="glass p-6 rounded-2xl border-t-4 border-yellow-500">
            <h3 class="text-lg font-bold text-yellow-400 mb-4 flex items-center gap-2">⏳ অপেক্ষমান পেমেন্ট (Pending)</h3>
            <div id="pendingList" class="space-y-3">
                <p class="text-slate-400 text-sm text-center">লোড হচ্ছে...</p>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl border-t-4 border-emerald-500">
            <h3 class="text-lg font-bold text-emerald-400 mb-4">📝 ম্যানুয়াল ডেটা এন্ট্রি</h3>
            <form id="addForm" class="space-y-4">
                <input type="date" id="date" required class="input-glass w-full p-2.5 rounded-xl">
                <select id="nameSelector" required class="input-glass w-full p-2.5 rounded-xl"></select>
                <div class="flex gap-4">
                    <select id="month" class="input-glass w-1/2 p-2.5 rounded-xl"><option value="January">জানুয়ারি</option><option value="February">ফেব্রুয়ারি</option><option value="March">মার্চ</option><option value="April">এপ্রিল</option><option value="May">মে</option><option value="June">জুন</option><option value="July">জুলাই</option><option value="August">আগস্ট</option><option value="September">সেপ্টেম্বর</option><option value="October">অক্টোবর</option><option value="November">নভেম্বর</option><option value="December">ডিসেম্বর</option></select>
                    <select id="year" class="input-glass w-1/2 p-2.5 rounded-xl"></select>
                </div>
                <div class="flex gap-4">
                    <input type="number" id="amount" placeholder="পরিমাণ (৳)" required class="input-glass w-1/3 p-2.5 rounded-xl">
                    <select id="paymentMethod" class="input-glass w-1/3 p-2.5 rounded-xl text-blue-300 font-bold">
                        <option value="Cash">Cash</option><option value="bKash">bKash</option>
                        <option value="Nagad">Nagad</option><option value="Rocket">Rocket</option><option value="Bank">Bank</option>
                    </select>
                    <select id="status" class="input-glass w-1/3 p-2.5 rounded-xl text-emerald-400 font-bold"><option value="Paid">✅ Paid</option><option value="Unpaid">❌ Unpaid</option></select>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl mt-4 shadow-[0_0_15px_rgba(16,185,129,0.3)]">সেভ করুন</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwNIOxGOVdV30KhyVhqyo41ZmySgYxy6nzv64BY0qo6jSHC0G7-iv1oyIMQPifxRFjG/exec"; // ⚠️ URL বসান 

        window.onload = async () => {
            const y = new Date().getFullYear();
            const m = new Date().toLocaleString('en-US', { month: 'long' });
            document.getElementById('month').value = m; document.getElementById('date').valueAsDate = new Date();
            for(let i=2024; i<=y+10; i++) document.getElementById('year').innerHTML += `<option value="${i}" ${i===y?'selected':''}>${i}</option>`;
        };

        function checkLogin() {
            if(document.getElementById('username').value === "admin" && document.getElementById('password').value === "admin123") {
                document.getElementById('loginSection').style.display = 'none'; document.getElementById('formSection').style.display = 'block';
                loadAdminData();
            } else { document.getElementById('loginError').classList.remove('hidden'); }
        }
        function logout() { location.reload(); }

        async function loadAdminData() {
            try {
                const res = await fetch(API_URL); const data = await res.json();
                
                const sel = document.getElementById('nameSelector'); sel.innerHTML = '<option value="">সদস্য নির্বাচন করুন</option>';
                data.members.forEach(m => sel.innerHTML += `<option value="${m.Name}|${m.Designation}">${m.Name} (${m.Designation})</option>`);

                const pendingDiv = document.getElementById('pendingList'); pendingDiv.innerHTML = '';
                const pendings = data.payments.filter(p => p.Status.toLowerCase() === 'pending');
                
                if(pendings.length === 0) {
                    pendingDiv.innerHTML = '<p class="text-slate-400 text-sm text-center">নতুন কোনো রিকোয়েস্ট নেই</p>'; return;
                }

                const uniquePendings = [];
                pendings.slice().reverse().forEach(p => { if(!uniquePendings.find(u => u.Name === p.Name && u.Month === p.Month)) uniquePendings.push(p); });

                uniquePendings.forEach(p => {
                    // NEW: Showing Payment Method in the UI
                    const methodHtml = p.PaymentMethod ? `<span class="bg-blue-900/50 text-blue-300 text-xs px-2 py-0.5 rounded border border-blue-500/30 ml-2">${p.PaymentMethod}</span>` : '';
                    
                    pendingDiv.innerHTML += `
                        <div class="bg-slate-800/50 p-4 rounded-xl flex justify-between items-center border border-yellow-500/20">
                            <div>
                                <p class="font-bold text-white">${p.Name} <span class="text-xs font-normal text-slate-400">(${p.Month} ${p.Year})</span></p>
                                <p class="text-sm text-yellow-400 mt-1">TrxID: <span class="font-mono bg-black/30 px-2 py-0.5 rounded">${p.TrxID || 'N/A'}</span>${methodHtml}</p>
                                <p class="text-emerald-400 font-bold mt-1">৳${p.Amount}</p>
                            </div>
                            <button onclick="approvePayment('${p.Name}', '${p.Month}', '${p.Year}', this)" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-lg">✅ Confirm</button>
                        </div>
                    `;
                });
            } catch(e) {}
        }

        async function approvePayment(name, month, year, btnElement) {
            btnElement.innerText = '⏳'; btnElement.disabled = true;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action: 'approve', name: name, month: month, year: year}) });
                btnElement.parentElement.innerHTML = '<span class="text-emerald-400 font-bold">✅ Approved!</span>';
            } catch(e) { alert("Error!"); btnElement.innerText = '✅ Confirm'; btnElement.disabled = false; }
        }

        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault(); const btn = document.getElementById('submitBtn'); btn.innerHTML = '⏳'; btn.disabled = true;
            const nameData = document.getElementById('nameSelector').value.split('|');
            const rowData = { 
                action: 'submit', date: document.getElementById('date').value, 
                name: nameData[0], designation: nameData[1], month: document.getElementById('month').value, year: document.getElementById('year').value, 
                amount: document.getElementById('amount').value, status: document.getElementById('status').value,
                paymentMethod: document.getElementById('paymentMethod').value // Admin selected method
            };
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify(rowData) });
                alert("✅ সেভ হয়েছে!"); document.getElementById('amount').value = ''; document.getElementById('date').valueAsDate = new Date();
            } catch(e) {} finally { btn.innerHTML = 'সেভ করুন'; btn.disabled = false; loadAdminData(); }
        });
    </script>
</body>
</html>
