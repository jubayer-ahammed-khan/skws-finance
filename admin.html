<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | সত্যের কাফেলা ওয়েলফেয়ার সোসাইটি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #0f172a; 
            background-image: radial-gradient(circle at bottom left, #1e293b, #0f172a);
            color: #f8fafc;
        } 
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .input-glass:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        select option { background-color: #1e293b; color: #fff; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="loginSection" class="glass p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-4 border-blue-500 transform transition-all relative overflow-hidden">
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500/20 rounded-full blur-[50px] -z-10"></div>
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-900/50 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                <span class="text-2xl">🔒</span>
            </div>
            <h2 class="text-3xl font-bold text-white">অ্যাডমিন লগিন</h2>
            <p class="text-slate-400 mt-1 text-sm">শুধুমাত্র অনুমোদিত ব্যক্তিদের জন্য</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1.5">ইউজারনেম</label>
                <input type="text" id="username" placeholder="admin" class="input-glass w-full p-3 rounded-xl transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1.5">পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="••••••••" class="input-glass w-full p-3 rounded-xl transition">
            </div>
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.4)] transform transition hover:-translate-y-0.5 mt-2">লগিন করুন</button>
            <p id="loginError" class="text-rose-400 text-sm font-bold text-center mt-3 hidden bg-rose-500/10 py-2 rounded-lg border border-rose-500/20">❌ ইউজারনেম বা পাসওয়ার্ড ভুল!</p>
        </div>
        
        <div class="text-center mt-8">
            <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-blue-400 transition">← ড্যাশবোর্ডে ফিরে যান</a>
        </div>
    </div>

    <div id="formSection" class="glass p-8 rounded-3xl shadow-2xl w-full max-w-lg border-t-4 border-emerald-500 hidden transform transition-all relative overflow-hidden">
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-emerald-500/10 rounded-full blur-[50px] -z-10"></div>
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-2xl font-bold text-white flex items-center gap-2"><span>📝</span> এন্ট্রি ফর্ম</h2>
            <button onclick="logout()" class="text-xs bg-rose-500/10 border border-rose-500/30 text-rose-400 font-bold px-4 py-1.5 rounded-full hover:bg-rose-500/20 transition">লগ আউট</button>
        </div>

        <form id="addForm" class="space-y-4">
            <div>
                <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Date</label>
                <input type="date" id="date" required class="input-glass w-full p-2.5 rounded-xl cursor-pointer">
            </div>
            
            <div id="nameContainer">
                </div>
            
            <div>
                <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Designation</label>
                <input type="text" id="designation" placeholder="নাম সিলেক্ট করলে অটোমেটিক আসবে" readonly required class="input-glass w-full p-2.5 rounded-xl opacity-70 cursor-not-allowed">
            </div>
            
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Month</label>
                    <select id="month" class="input-glass w-full p-2.5 rounded-xl cursor-pointer">
                        <option value="January">জানুয়ারি</option><option value="February">ফেব্রুয়ারি</option><option value="March">মার্চ</option>
                        <option value="April">এপ্রিল</option><option value="May">মে</option><option value="June">জুন</option>
                        <option value="July">জুলাই</option><option value="August">আগস্ট</option><option value="September">সেপ্টেম্বর</option>
                        <option value="October">অক্টোবর</option><option value="November">নভেম্বর</option><option value="December">ডিসেম্বর</option>
                    </select>
                </div>
                <div class="w-1/2">
                    <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Year</label>
                    <select id="year" class="input-glass w-full p-2.5 rounded-xl cursor-pointer"></select>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Amount (৳)</label>
                    <input type="number" id="amount" placeholder="500" required class="input-glass w-full p-2.5 rounded-xl">
                </div>
                <div class="w-1/2">
                    <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Status</label>
                    <select id="status" class="input-glass w-full p-2.5 rounded-xl font-bold text-emerald-400 cursor-pointer">
                        <option value="Paid">✅ Paid</option>
                        <option value="Unpaid">❌ Unpaid</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition shadow-[0_0_15px_rgba(16,185,129,0.3)] mt-6">
                ডেটা সেভ করুন
            </button>
            <p id="message" class="text-center text-sm font-bold mt-3"></p>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwRgePnO2r60DaI9qwB1QDrBAS8yAwwihlF-4ibuo-cWvUBZqcAXQ7UUa6oCNhliuyB/exec";
        let masterMembers = [];

        window.onload = async () => {
            const currentYear = new Date().getFullYear();
            const yearSelect = document.getElementById('year');
            const currentMonth = new Date().toLocaleString('en-US', { month: 'long' });
            
            document.getElementById('month').value = currentMonth;
            document.getElementById('date').valueAsDate = new Date();

            for (let y = 2024; y <= currentYear + 10; y++) {
                let option = document.createElement('option');
                option.value = y;
                option.text = y;
                if (y === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
            
            const nameContainer = document.getElementById('nameContainer');
            nameContainer.innerHTML = `
                <label class="text-sm font-semibold text-slate-300 mb-1.5 block">Member Name</label>
                <select id="nameSelector" required class="input-glass w-full p-2.5 rounded-xl cursor-pointer">
                    <option value="">⏳ মেম্বার লোড হচ্ছে...</option>
                </select>
            `;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                masterMembers = data.members;
                
                const nameSelect = document.getElementById('nameSelector');
                nameSelect.innerHTML = '<option value="">সদস্য নির্বাচন করুন</option>';
                
                masterMembers.forEach(member => {
                    // NEW LOGIC: Store BOTH Name and Designation in the value, separated by a pipe "|"
                    nameSelect.innerHTML += `<option value="${member.Name}|${member.Designation}">${member.Name} (${member.Designation})</option>`;
                });

                nameSelect.addEventListener('change', function() {
                    if (this.value) {
                        // Split the value back into Name and Designation
                        const selectedData = this.value.split('|');
                        const selectedDesignation = selectedData[1];
                        document.getElementById('designation').value = selectedDesignation;
                    } else {
                        document.getElementById('designation').value = '';
                    }
                });
            } catch (error) {
                console.error("Failed to load members.");
            }
        };

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "admin" && pass === "admin123") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('formSection').style.display = 'block';
                document.getElementById('loginError').classList.add('hidden');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const submitBtn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            
            submitBtn.innerHTML = '<span class="animate-pulse">⏳ সেভ হচ্ছে...</span>';
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-emerald-600', 'bg-slate-600');
            submitBtn.classList.replace('hover:bg-emerald-500', 'hover:bg-slate-600');
            submitBtn.style.boxShadow = 'none';

            // Extract the pure Name without the designation attached to it
            const rawSelectorValue = document.getElementById('nameSelector').value;
            const actualName = rawSelectorValue.split('|')[0];

            const rowData = {
                date: document.getElementById('date').value,
                name: actualName, 
                designation: document.getElementById('designation').value,
                month: document.getElementById('month').value,
                year: document.getElementById('year').value,
                amount: document.getElementById('amount').value,
                status: document.getElementById('status').value
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rowData)
                });
                
                message.innerHTML = "✅ সফলভাবে সেভ হয়েছে!";
                message.className = "text-center text-sm font-bold mt-4 text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 py-2.5 rounded-xl";
                
                document.getElementById('amount').value = '';
                document.getElementById('nameSelector').value = '';
                document.getElementById('designation').value = '';
                document.getElementById('date').valueAsDate = new Date(); 
            } catch (error) {
                message.innerHTML = "❌ সেভ করতে সমস্যা হয়েছে।";
                message.className = "text-center text-sm font-bold mt-4 text-rose-400 bg-rose-500/10 border border-rose-500/20 py-2.5 rounded-xl";
            } finally {
                submitBtn.innerText = "ডেটা সেভ করুন";
                submitBtn.disabled = false;
                submitBtn.classList.replace('bg-slate-600', 'bg-emerald-600');
                submitBtn.classList.replace('hover:bg-slate-600', 'hover:bg-emerald-500');
                submitBtn.style.boxShadow = '';
            }
        });
    </script>
</body>
</html>
